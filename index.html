<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCNA 第一册 · 刷题系统</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --surface3: #2c3040;
  --border: #353a4a;
  --text: #e4e6ed;
  --text2: #9ca0b0;
  --text3: #6b7084;
  --accent: #6c8cff;
  --accent2: #4a6ae5;
  --accent-glow: rgba(108,140,255,0.15);
  --green: #4ade80;
  --green-bg: rgba(74,222,128,0.1);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.1);
  --yellow: #fbbf24;
  --yellow-bg: rgba(251,191,36,0.1);
  --radius: 12px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.logo span { color: var(--accent); }

.header-stats { display: flex; gap: 20px; font-size: 13px; color: var(--text2); }
.header-stats .stat-val { color: var(--text); font-weight: 600; }

.app { display: flex; min-height: calc(100vh - 57px); }

.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 16px 12px;
  flex-shrink: 0;
  overflow-y: auto;
  height: calc(100vh - 57px);
  position: sticky;
  top: 57px;
}

.nav-group { margin-bottom: 20px; }
.nav-label {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 0 12px; margin-bottom: 6px;
}

.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 14px; color: var(--text2);
  transition: all 0.15s; font-weight: 400;
}

.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 500; }

.nav-item .icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.nav-item .badge { margin-left: auto; font-size: 11px; background: var(--surface3); padding: 2px 7px; border-radius: 10px; font-weight: 500; }

.main { flex: 1; padding: 28px 36px; max-width: 900px; overflow-y: auto; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }

.dash-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
.dash-card .num { font-size: 32px; font-weight: 700; line-height: 1.2; }
.dash-card .label { font-size: 13px; color: var(--text2); margin-top: 4px; }
.dash-card.accent .num { color: var(--accent); }
.dash-card.green .num { color: var(--green); }
.dash-card.red .num { color: var(--red); }
.dash-card.yellow .num { color: var(--yellow); }

.progress-bar { width: 100%; height: 8px; background: var(--surface3); border-radius: 4px; overflow: hidden; margin: 12px 0; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; background: linear-gradient(90deg, var(--accent2), var(--accent)); }

.q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.q-tag { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px; }
.q-tag.multi { background: var(--yellow-bg); color: var(--yellow); }
.q-num { font-size: 13px; color: var(--text3); }

.q-text { font-size: 16px; font-weight: 500; line-height: 1.8; margin-bottom: 24px; color: var(--text); }

.q-actions { display: flex; gap: 8px; margin-bottom: 16px; }
.q-actions button {
  font-size: 13px; padding: 6px 14px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text2); cursor: pointer; transition: all 0.15s;
}
.q-actions button:hover { border-color: var(--accent); color: var(--accent); }
.q-actions button.fav-active { border-color: var(--yellow); color: var(--yellow); background: var(--yellow-bg); }

.options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

.option {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 14px 16px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); cursor: pointer;
  transition: all 0.15s; font-size: 15px; line-height: 1.6; user-select: none;
}

.option:hover { border-color: var(--accent); background: var(--accent-glow); }

.option .opt-mark {
  width: 28px; height: 28px; border: 2px solid var(--border);
  border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 13px; font-weight: 600;
  flex-shrink: 0; transition: all 0.15s; margin-top: 1px;
}

.option.selected { border-color: var(--accent); background: var(--accent-glow); }
.option.selected .opt-mark { border-color: var(--accent); background: var(--accent); color: #fff; }

.option.correct { border-color: var(--green); background: var(--green-bg); }
.option.correct .opt-mark { border-color: var(--green); background: var(--green); color: #fff; }

.option.wrong { border-color: var(--red); background: var(--red-bg); }
.option.wrong .opt-mark { border-color: var(--red); background: var(--red); color: #fff; }

.option.disabled { pointer-events: none; }

.explanation {
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 16px 20px; margin-top: 16px;
  font-size: 14px; line-height: 1.8; color: var(--text2);
  display: none;
}
.explanation.show { display: block; }
.explanation .exp-title { color: var(--accent); font-weight: 600; margin-bottom: 6px; font-size: 13px; }

.result-line { font-size: 14px; font-weight: 600; margin-bottom: 8px; display: none; }
.result-line.show { display: flex; align-items: center; gap: 8px; }
.result-line.correct { color: var(--green); }
.result-line.wrong { color: var(--red); }

.nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; gap: 12px; }

.btn { padding: 10px 24px; border-radius: var(--radius-sm); border: none; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--text); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-confirm-multi {
  background: var(--accent); color: #fff; padding: 10px 28px;
  border-radius: var(--radius-sm); border: none; font-size: 14px;
  font-weight: 500; cursor: pointer; display: none;
}
.btn-confirm-multi.show { display: inline-block; }

.q-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; margin: 16px 0; }
.q-grid-item {
  width: 100%; aspect-ratio: 1; border: 1px solid var(--border);
  border-radius: 6px; display: flex; align-items: center;
  justify-content: center; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; color: var(--text2);
}
.q-grid-item:hover { border-color: var(--accent); }
.q-grid-item.current { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); }
.q-grid-item.answered-correct { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.q-grid-item.answered-wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }

.empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state .title { font-size: 16px; font-weight: 500; color: var(--text2); margin-bottom: 8px; }

.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .dash-grid { grid-template-columns: repeat(2, 1fr); }
  .q-grid { grid-template-columns: repeat(8, 1fr); }
  .header { padding: 12px 16px; }
  .mobile-menu-btn { display: block; }
}

.mobile-menu-btn { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }

@media (max-width: 768px) {
  .mobile-menu-btn { display: block; }
  .sidebar.mobile-open {
    display: block; position: fixed; top: 57px; left: 0; z-index: 200;
    width: 260px; height: calc(100vh - 57px);
    box-shadow: 4px 0 20px rgba(0,0,0,0.4);
  }
}

.fade-in { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">&#9776;</button>
    <div class="logo"><span>CCNA 第一册</span> &middot; 刷题系统</div>
  </div>
  <div class="header-stats">
    <div>已做 <span class="stat-val" id="hdr-done">0</span></div>
    <div>正确率 <span class="stat-val" id="hdr-rate">-</span></div>
  </div>
</div>

<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="nav-group">
      <div class="nav-label">练习模式</div>
      <div class="nav-item active" onclick="switchPage('dashboard')" data-page="dashboard">
        <span class="icon">&#128202;</span> 总览
      </div>
      <div class="nav-item" onclick="switchPage('practice')" data-page="practice">
        <span class="icon">&#9745;</span> 顺序练习 <span class="badge" id="badge-all">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('random')" data-page="random">
        <span class="icon">&#127922;</span> 随机练习
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-label">复习</div>
      <div class="nav-item" onclick="switchPage('wrong')" data-page="wrong">
        <span class="icon">&#10060;</span> 错题本 <span class="badge" id="badge-wrong">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('fav')" data-page="fav">
        <span class="icon">&#11088;</span> 收藏夹 <span class="badge" id="badge-fav">0</span>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-label">设置</div>
      <div class="nav-item" onclick="switchPage('settings')" data-page="settings">
        <span class="icon">&#9881;</span> 设置
      </div>
    </div>
  </div>

  <div class="main" id="main-content"></div>
</div>

<script>
// ==================== QUESTIONS DATA ====================
const QUESTIONS = [
  {
    type: "multi", id: "q1",
    question: "哪两项是可扩展网络的特征？（选择两项。）",
    options: ["A. 规模增长时不会对现有用户造成影响", "B. 提供数量有限的应用程序", "C. 流量增加时容易过载", "D. 适合使用允许扩展的模块化设备", "E. 不如小型网络可靠"],
    answer: "AD",
    explanation: "可扩展性是指网络能够随着需求的增长而扩展，且不影响现有服务的性能。采用层次化设计和模块化硬件是实现这一点的关键。"
  },
  {
    type: "multi", id: "q2",
    question: "哪两个互联网连接选项不要求将物理线缆连接到大楼？（选择两项。）",
    options: ["A. 拨号", "B. 专用租用线路", "C. DSL", "D. 蜂窝网", "E. 卫星"],
    answer: "DE",
    explanation: "蜂窝网通过移动信号塔连接，卫星通过轨道卫星转发信号，二者均属于无线接入技术，无需铺设物理线缆到用户建筑物。"
  },
  {
    type: "multi", id: "q3",
    question: "网络上的终端设备有哪些功能？（选择两项。）",
    options: ["A. 它们会过滤数据传输以增强安全性。", "B. 它们提供网络消息的传输通道。", "C. 它们是人与通信网络之间的界面。", "D. 它们会发出通过网络传输的数据。", "E. 它们会在链路发生故障时通过备用路径传输数据。"],
    answer: "CD",
    explanation: "终端设备（如 PC、手机）充当用户接入网络的接口，也是数据流量的源头或终点。传输通道属于中间设备和介质的职责。"
  },
  {
    type: "multi", id: "q4",
    question: "下列哪三个缩写词/首字母缩略词代表标准组织？（选择三项。）",
    options: ["A. IETF", "B. MAC", "C. OSI", "D. IANA", "E. IEEE", "F. TCP/IP"],
    answer: "ADE",
    explanation: "IETF 负责 Internet 标准，IANA 负责 IP 地址分配，IEEE 负责以太网等硬件标准。MAC 是物理地址，OSI 和 TCP/IP 则是参考模型。"
  },
  {
    type: "multi", id: "q5",
    question: "使用分层网络模型的两个优点是什么？（选择两项。）",
    options: ["A. 它可加快数据包传输速度。", "B. 它可防止设计者创建自己的模型。", "C. 它确保一个层中的设备可在下一较高层上运行。", "D. 它有助于协议设计。", "E. 它可以防止一个层中的技术影响其他层。"],
    answer: "DE",
    explanation: "分层模型促进了模块化开发（有助于设计），并实现了层间解耦（某层的变动不影响其他层），从而增强了兼容性。"
  },
  {
    type: "multi", id: "q6",
    question: "哪两种协议在互联网层运行？（选择两项。）",
    options: ["A. IP", "B. BOOTP", "C. ICMP", "D. POP", "E. PPP"],
    answer: "AC",
    explanation: "在 TCP/IP 模型中，互联网层的主要协议包括 IP（寻址/封装）和 ICMP（诊断/控制信息）。"
  },
  {
    type: "multi", id: "q7",
    question: "关于 IPv4 和 IPv6 地址，哪两句表述是正确的？（选择两项。）",
    options: ["A. IPv4 地址由十六进制数字表示。", "B. IPv6 地址由十六进制数字表示。", "C. IPv6 地址的长度为 32 位。", "D. IPv4 地址的长度为 128 位。", "E. IPv6 地址的长度为 64 位。", "F. IPv4 地址的长度为 32 位。"],
    answer: "BF",
    explanation: "IPv4 地址是 32 位二进制，通常写成点分十进制；IPv6 地址是 128 位二进制，通常写成十六进制冒号分隔。"
  },
  {
    type: "multi", id: "q8",
    question: "哪两个工程组织定义了应用于数据链路层的开放标准和协议？（选择两项。）",
    options: ["A. Internet 协会 (ISOC)", "B. 国际标准化组织 (ISO)", "C. 互联网编号指派机构 (IANA)", "D. 国际电信联盟 (ITU)", "E. 电子工业联盟 (EIA)"],
    answer: "BD",
    explanation: "物理层和数据链路层标准通常由硬件工程组织定义，如 IEEE、ISO、ITU 和 ANSI。"
  },
  {
    type: "multi", id: "q9",
    question: "OSI 模型数据链路层的两个子层是什么？（选择两项。）",
    options: ["A. MAC 子层", "B. 互联网子层", "C. 物理层", "D. LLC 子层", "E. 网络接入子层", "F. 传输层"],
    answer: "AD",
    explanation: "数据链路层分为 LLC（逻辑链路控制，与上层软件通信）和 MAC（介质访问控制，与底层硬件通信）。"
  },
  {
    type: "multi", id: "q10",
    question: "OSI 模型的数据链路层执行哪两种服务？（选择两项。）",
    options: ["A. 确定转发数据包的路径。", "B. 加密数据包。", "C. 通过构建 MAC 地址表来监控第 2 层通信。", "D. 接受第 3 层数据包，并将其封装成帧。", "E. 提供介质访问控制并执行错误检测。"],
    answer: "DE",
    explanation: "链路层核心任务：封帧（Header + Packet + Trailer）、管理介质访问权限以及通过 FCS 校验错误。"
  },
  {
    type: "multi", id: "q11",
    question: "以太网技术有哪些特征？（选择两项。）",
    options: ["A. 它通常使用平均 16 MB/s 的数据传输速率。", "B. 它使用环形拓扑。", "C. 它使用 CSMA/CD 访问控制方法。", "D. 它受 IEEE 802.3 标准的支持。", "E. 它受 IEEE 802.5 标准的支持。"],
    answer: "CD",
    explanation: "以太网的标准号是 802.3，传统共享介质环境使用 CSMA/CD 处理冲突。"
  },
  {
    type: "multi", id: "q12",
    question: "下列哪两项是以太网帧的大小（最小和最大）？（选择两项。）",
    options: ["A. 64 个字节", "B. 1024 个字节", "C. 128 个字节", "D. 1518 个字节", "E. 56 个字节"],
    answer: "AD",
    explanation: "这是标准以太网 II 帧的范围。小于 64 为碎片，大于 1518（不含 VLAN 标签）为巨人帧。"
  },
  {
    type: "multi", id: "q13",
    question: "MAC 子层执行哪些功能或操作？（选择两项。）",
    options: ["A. 它执行 NIC 驱动程序软件的功能。", "B. 它处理上层和下层之间的通信。", "C. 它将控制信息添加到网络协议数据中。", "D. 它添加了报头和帧尾，形成了一个 OSI 第 2 层 PDU。", "E. 它负责介质访问控制。"],
    answer: "DE",
    explanation: "MAC 子层直接与物理层接触，负责硬件寻址和帧的封装/拆封。"
  },
  {
    type: "multi", id: "q14",
    question: "在以太网 MAC 地址解析过程中会使用哪两条 ICMPv6 消息？（选择两项。）",
    options: ["A. 路由器请求", "B. 回声 (Echo) 请求", "C. 路由器通告", "D. 邻居通告 (Neighbor Advertisement)", "E. 邻居请求 (Neighbor Solicitation)"],
    answer: "DE",
    explanation: "在 IPv6 中，不再使用 ARP，而是使用 NDP（邻居发现协议），其核心报文就是 ICMPv6 的邻居请求（NS）和邻居通告（NA）。"
  },
  {
    type: "multi", id: "q15",
    question: "哪两个部分是 IPv4 地址的组件？（选择两项。）",
    options: ["A. 广播部分", "B. 子网部分", "C. 主机部分", "D. 网络部分", "E. 物理部分", "F. 逻辑部分"],
    answer: "CD",
    explanation: "一个完整的 IPv4 地址在逻辑上被划分为网络前缀（网络部分）和该网络内的特定设备标识（主机部分）。"
  },
  {
    type: "multi", id: "q16",
    question: "IPv6 全局单播地址的三个部分是什么？（选择三项。）",

// ==================== STATE ====================
const STORAGE_KEY = 'ccna_v1_quiz';

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : {};
  } catch { return {}; }
}

function saveState(st) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(st));
}

let state = loadState();
if (!state.answers) state.answers = {};
if (!state.wrong) state.wrong = [];
if (!state.wrongCount) state.wrongCount = {};
if (!state.favorites) state.favorites = [];

let randomCurrentQ = null;
let currentPage = 'dashboard';
let lastPage = 'dashboard';
let currentType = null;
let currentIndex = 0;
let currentQuestions = [];
let selectedOptions = new Set();
let answered = false;

// ==================== HELPERS ====================
function getStats() {
  const total = Object.keys(state.answers).length;
  const correct = Object.values(state.answers).filter(a => a.correct).length;
  const wrong = state.wrong.length;
  const rate = total > 0 ? Math.round(correct / total * 100) : 0;
  return { total, correct, wrong, rate };
}

function updateHeaderStats() {
  const s = getStats();
  document.getElementById('hdr-done').textContent = s.total;
  document.getElementById('hdr-rate').textContent = s.total > 0 ? s.rate + '%' : '-';
  document.getElementById('badge-all').textContent = QUESTIONS.length;
  document.getElementById('badge-wrong').textContent = state.wrong.length;
  document.getElementById('badge-fav').textContent = state.favorites.length;
}

function toggleMobileMenu() {
  document.getElementById('sidebar').classList.toggle('mobile-open');
}

// ==================== NAVIGATION ====================
function switchPage(page) {
  lastPage = currentPage;
  currentPage = page;
  currentIndex = 0;
  currentQuestions = [];
  selectedOptions = new Set();
  answered = false;
  if (page === 'random') randomCurrentQ = null;

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.querySelector(`[data-page="${page}"]`);
  if (navEl) navEl.classList.add('active');

  document.getElementById('sidebar').classList.remove('mobile-open');
  render();
}

function render() {
  const main = document.getElementById('main-content');
  if (currentPage === 'dashboard') renderDashboard(main);
  else if (currentPage === 'practice') renderPractice(main);
  else if (currentPage === 'random') renderRandom(main);
  else if (currentPage === 'wrong') renderWrong(main);
  else if (currentPage === 'fav') renderFavorites(main);
  else if (currentPage === 'settings') renderSettings(main);
  lastPage = currentPage;
  updateHeaderStats();
}

// ==================== DASHBOARD ====================
function renderDashboard(el) {
  const s = getStats();
  const done = Object.keys(state.answers).length;
  const pct = QUESTIONS.length > 0 ? Math.round(done / QUESTIONS.length * 100) : 0;

  el.innerHTML = `
    <div class="fade-in">
      <h2 style="margin-bottom:20px;font-size:22px;font-weight:700;">学习总览</h2>
      <div class="dash-grid">
        <div class="dash-card accent"><div class="num">${QUESTIONS.length}</div><div class="label">总题数</div></div>
        <div class="dash-card green"><div class="num">${s.total}</div><div class="label">已做题</div></div>
        <div class="dash-card"><div class="num" style="color:var(--green)">${s.rate}%</div><div class="label">正确率</div></div>
        <div class="dash-card red"><div class="num">${s.wrong}</div><div class="label">错题数</div></div>
      </div>

      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:16px;">整体进度</h3>
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
          <span>多选题</span>

          <button class="btn btn-secondary" onclick="switchPage('practice')">&#9745; 顺序练习</button>
          ${state.wrong.length > 0 ? '<button class="btn btn-secondary" onclick="switchPage(\'wrong\')">&#10060; 复习错题 (' + state.wrong.length + ')</button>' : ''}

// ==================== PRACTICE ====================
function renderPractice(el) {
  if (currentQuestions.length === 0 || currentPage !== lastPage) {
    currentQuestions = QUESTIONS;
  }
  renderQuestion(el, currentQuestions, currentIndex);
}

// ==================== RANDOM ====================
function drawRandomQuestion() {
  const idx = Math.floor(Math.random() * QUESTIONS.length);
  randomCurrentQ = QUESTIONS[idx];
  answered = false;
  selectedOptions = new Set();
}

function renderRandom(el) {
  if (!randomCurrentQ) drawRandomQuestion();
  renderRandomQuestion(el, randomCurrentQ);
}

function renderRandomQuestion(el, q) {
  const prevAnswer = state.answers[q.id] || null;
  const isFav = state.favorites.includes(q.id);
  const wrongTimes = state.wrongCount[q.id] || 0;

  if (prevAnswer && !answered) {
    answered = true;
    selectedOptions = new Set(prevAnswer.selected || []);
  }

  let optionsHTML = q.options.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    let cls = 'multi-mode';
    if (answered || prevAnswer) {
      cls += ' disabled';
      const correctLetters = q.answer.split('').map(l => l.charCodeAt(0) - 65);
      if (selectedOptions.has(i)) {
        cls += correctLetters.includes(i) ? ' correct' : ' wrong';
      } else if (correctLetters.includes(i)) {
        cls += ' correct';
      }
    } else if (selectedOptions.has(i)) {
      cls += ' selected';
    }
    let optText = opt.replace(/^[A-Fa-f][.、\s]+/, '').trim();
    return '<div class="option ' + cls + '" onclick="selectOption(' + i + ')"><span class="opt-mark">' + letter + '</span><span>' + optText + '</span></div>';
  }).join('');

  let resultHTML = '';
  if (answered || prevAnswer) {
    const isCorrect = prevAnswer?.correct ?? false;
    resultHTML = '<div class="result-line show ' + (isCorrect ? 'correct' : 'wrong') + '">' + (isCorrect ? '&#10003; 回答正确' : '&#10007; 回答错误') + ' &nbsp;正确答案：' + q.answer + '</div>';
  }

  let expHTML = '';
  if ((answered || prevAnswer) && q.explanation) {
    expHTML = '<div class="explanation show"><div class="exp-title">解析</div>' + q.explanation + '</div>';
  }

  let confirmBtn = '';
  if (!answered && !prevAnswer) {
    confirmBtn = '<button class="btn-confirm-multi ' + (selectedOptions.size > 0 ? 'show' : '') + '" id="confirmBtn" onclick="confirmMulti()">确认提交 (' + selectedOptions.size + '项)</button>';
  }

  let wrongBadge = wrongTimes > 0 ? '<span style="font-size:12px;color:var(--red);margin-left:8px;">&#10060; 已错 ' + wrongTimes + ' 次</span>' : '';

  el.innerHTML = `
    <div class="fade-in">
      <div class="q-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="q-tag multi">多选题</span>
          ${wrongBadge}
        </div>
        <div class="q-actions">
          <button onclick="toggleFavorite('${q.id}')" class="${isFav ? 'fav-active' : ''}">${isFav ? '&#9733; 已收藏' : '&#9734; 收藏'}</button>
        </div>
      </div>
      <div class="q-text">${q.question}</div>
      ${!answered && !prevAnswer ? '<div style="font-size:12px;color:var(--text3);margin-bottom:12px;">（多选题，请选择所有正确选项后点击确认）</div>' : ''}
      <div class="options">${optionsHTML}</div>
      ${confirmBtn}
      ${resultHTML}
      ${expHTML}
      <div class="nav-btns">
        <button class="btn btn-primary" onclick="nextRandomQuestion()" ${!(answered || prevAnswer) ? 'disabled' : ''}>换一题 &rarr;</button>
      </div>
    </div>
  `;
}

// ==================== WRONG & FAV ====================
function renderWrong(el) {
  const wrongQs = QUESTIONS.filter(q => state.wrong.includes(q.id));
  if (wrongQs.length === 0) {
    el.innerHTML = '<div class="empty-state fade-in"><div class="icon">&#127881;</div><div class="title">错题本为空</div><div>太棒了，继续保持！</div></div>';
    return;
  }
  if (currentPage !== lastPage) {
    currentQuestions = wrongQs;
  }
  renderQuestion(el, currentQuestions, currentIndex);
}

function renderFavorites(el) {
  const favQs = QUESTIONS.filter(q => state.favorites.includes(q.id));
  if (favQs.length === 0) {
    el.innerHTML = '<div class="empty-state fade-in"><div class="icon">&#11088;</div><div class="title">收藏夹为空</div><div>点击题目中的收藏按钮添加</div></div>';
    return;
  }
  if (currentPage !== lastPage) {
    currentQuestions = favQs;
  }
  renderQuestion(el, currentQuestions, currentIndex);
}

// ==================== QUESTION RENDERER ====================
function renderQuestion(el, questions, index) {
  if (index >= questions.length) {
    el.innerHTML = '<div class="empty-state fade-in"><div class="icon">&#127881;</div><div class="title">全部完成！</div></div>';
    return;
  }

  const q = questions[index];
  const prevAnswer = state.answers[q.id] || null;
  const isFav = state.favorites.includes(q.id);

  if (prevAnswer && !answered) {
    answered = true;
    selectedOptions = new Set(prevAnswer.selected || []);
  }

  let optionsHTML = q.options.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    let cls = 'multi-mode';
    if (answered || prevAnswer) {
      cls += ' disabled';
      const correctLetters = q.answer.split('').map(l => l.charCodeAt(0) - 65);
      if (selectedOptions.has(i)) {
        cls += correctLetters.includes(i) ? ' correct' : ' wrong';
      } else if (correctLetters.includes(i)) {
        cls += ' correct';
      }
    } else if (selectedOptions.has(i)) {
      cls += ' selected';
    }
    let optText = opt.replace(/^[A-Fa-f][.、\s]+/, '').trim();
    return '<div class="option ' + cls + '" onclick="selectOption(' + i + ')"><span class="opt-mark">' + letter + '</span><span>' + optText + '</span></div>';
  }).join('');

  let resultHTML = '';
  if (answered || prevAnswer) {
    const isCorrect = prevAnswer?.correct ?? false;
    resultHTML = '<div class="result-line show ' + (isCorrect ? 'correct' : 'wrong') + '">' + (isCorrect ? '&#10003; 回答正确' : '&#10007; 回答错误') + ' &nbsp;正确答案：' + q.answer + '</div>';
  }

  let expHTML = '';
  if ((answered || prevAnswer) && q.explanation) {
    expHTML = '<div class="explanation show"><div class="exp-title">解析</div>' + q.explanation + '</div>';
  }

  let confirmBtn = '';
  if (!answered && !prevAnswer) {
    confirmBtn = '<button class="btn-confirm-multi ' + (selectedOptions.size > 0 ? 'show' : '') + '" id="confirmBtn" onclick="confirmMulti()">确认提交 (' + selectedOptions.size + '项)</button>';
  }

  // Navigation grid
  let gridHTML = '';
  if (questions.length > 1) {
    gridHTML = '<div class="q-grid">' + questions.map((qq, i) => {
      let gcls = '';
      if (i === index) gcls = 'current';
      else if (state.answers[qq.id]?.correct) gcls = 'answered-correct';
      else if (state.answers[qq.id] && !state.answers[qq.id].correct) gcls = 'answered-wrong';
      return '<div class="q-grid-item ' + gcls + '" onclick="goToQuestion(' + i + ')">' + (i + 1) + '</div>';
    }).join('') + '</div>';
  }

  const wrongTimesQ = state.wrongCount[q.id] || 0;
  el.innerHTML = `
    <div class="fade-in">
      <div class="q-header">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span class="q-tag multi">多选题</span>
          <span class="q-num">${index + 1} / ${questions.length}</span>
          ${wrongTimesQ > 0 ? '<span style="font-size:12px;color:var(--red);">&#10060; 已错 ' + wrongTimesQ + ' 次</span>' : ''}
        </div>
        <div class="q-actions">
          <button onclick="toggleFavorite('${q.id}')" class="${isFav ? 'fav-active' : ''}">${isFav ? '&#9733; 已收藏' : '&#9734; 收藏'}</button>
        </div>
      </div>

      <div class="q-text">${q.question}</div>
      ${!answered && !prevAnswer ? '<div style="font-size:12px;color:var(--text3);margin-bottom:12px;">（多选题，请选择所有正确选项后点击确认）</div>' : ''}
      <div class="options">${optionsHTML}</div>
      ${confirmBtn}
      ${resultHTML}
      ${expHTML}

      <div class="nav-btns">
        <button class="btn btn-secondary" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>&larr; 上一题</button>
        <button class="btn btn-primary" onclick="nextQuestion()">${index >= questions.length - 1 ? '完成' : '下一题 &rarr;'}</button>
      </div>

      ${gridHTML}
    </div>
  `;
}

// ==================== INTERACTIONS ====================
function selectOption(idx) {
  if (answered) return;
  if (selectedOptions.has(idx)) selectedOptions.delete(idx);
  else selectedOptions.add(idx);
  render();
}

function confirmMulti() {
  if (selectedOptions.size === 0) return;
  const q = currentPage === 'random' ? randomCurrentQ : currentQuestions[currentIndex];
  checkAnswer(q);
}

function checkAnswer(q) {
  answered = true;
  const selectedLetters = [...selectedOptions].map(i => String.fromCharCode(65 + i)).sort().join('');
  const correctLetters = q.answer.split('').sort().join('');
  const correct = selectedLetters === correctLetters;

  state.answers[q.id] = { selected: [...selectedOptions], correct };

  if (!correct) {
    if (!state.wrong.includes(q.id)) state.wrong.push(q.id);
    state.wrongCount[q.id] = (state.wrongCount[q.id] || 0) + 1;
  } else {
    state.wrong = state.wrong.filter(id => id !== q.id);
  }

  saveState(state);
  render();
}

function nextQuestion() {
  if (currentIndex < currentQuestions.length - 1) {
    currentIndex++;
    answered = false;
    selectedOptions = new Set();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    render();
  }
}

function nextRandomQuestion() {
  drawRandomQuestion();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevQuestion() {
  if (currentIndex > 0) {
    currentIndex--;
    answered = false;
    selectedOptions = new Set();
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function goToQuestion(idx) {
  currentIndex = idx;
  answered = false;
  selectedOptions = new Set();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function toggleFavorite(id) {
  if (state.favorites.includes(id)) {
    state.favorites = state.favorites.filter(fid => fid !== id);
  } else {
    state.favorites.push(id);
  }
  saveState(state);
  render();
}

          <div>
            <div style="font-size:14px;color:var(--red);">重置所有数据</div>
            <div style="font-size:12px;color:var(--text3);">清除所有记录、错题、收藏</div>
          </div>
          <button class="btn btn-secondary" onclick="resetAll()" style="font-size:13px;color:var(--red);border-color:var(--red);">重置</button>
        </div>
      </div>
      <div class="card">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:8px;">关于</h3>
        <div style="font-size:14px;color:var(--text2);line-height:1.8;">
          <p>CCNA 第一册 刷题系统</p>
          <p>题库：多选题 ${QUESTIONS.length} 道</p>
          <p>来源：第一册模块一、三、五、六、七、九、十一~十七 + 检查点一~六</p>
        </div>
      </div>
    </div>
  `;
}

function clearAnswers() {
  if (confirm('确定清除所有做题记录？')) {
    state.answers = {};
    state.wrongCount = {};
    saveState(state);
    render();
  }
}

function clearWrong() {
  if (confirm('确定清空错题本？')) {
    state.wrong = [];
    state.wrongCount = {};
    saveState(state);
    render();
  }
}

function clearFavorites() {
  if (confirm('确定清空收藏夹？')) {
    state.favorites = [];
    saveState(state);
    render();
  }
}

function resetAll() {
  if (confirm('确定重置所有数据？此操作不可恢复！')) {
    state = { answers: {}, wrong: [], favorites: [], wrongCount: {} };
    saveState(state);
    render();
  }
}

// ==================== KEYBOARD SHORTCUTS ====================
document.addEventListener('keydown', (e) => {
  if (currentPage === 'practice' || currentPage === 'random' || currentPage === 'wrong' || currentPage === 'fav') {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      if (currentPage === 'random') {
        if (answered || state.answers[randomCurrentQ?.id]) nextRandomQuestion();
      } else {
        nextQuestion();
      }
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (currentPage !== 'random') prevQuestion();
    } else if (['1','2','3','4','5','6','a','b','c','d','e','f','A','B','C','D','E','F'].includes(e.key)) {
      let idx;
      if ('123456'.includes(e.key)) idx = parseInt(e.key) - 1;
      else idx = e.key.toUpperCase().charCodeAt(0) - 65;

      const q = currentPage === 'random' ? randomCurrentQ : currentQuestions[currentIndex];
      if (q && idx >= 0 && idx < q.options.length) {
        selectOption(idx);
      }
    } else if (e.key === 'Enter') {
      if (!answered) confirmMulti();
    }
  }
});

// ==================== INIT ====================
render();
</script>

</body>
</html>
